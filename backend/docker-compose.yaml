include:
  - ./database/docker-compose.db.yaml
  - ./src/generate_routes/docker-compose.worker.yaml

networks:
  routor_network:
    driver: bridge

services:
  api:
    container_name: routor_api
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.12-slim-trixie
        COPY --from=ghcr.io/astral-sh/uv:0.11.17 /uv /uvx /bin/
        COPY . /app
        ENV UV_NO_DEV=1
        WORKDIR /app
        RUN uv sync --locked
    environment:
      - CELERY_BROKER_URL=redis://routor_redis:6379/0
      - DATABASE_URL=postgresql://routor_user:routor_password@db:5432/routor_database
    ports:
      - "8000:8000"
    command: ["uv", "run", "main.py"]
    networks:
      - routor_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: routor_redis
    ports:
      - "6379:6379"
    networks:
      - routor_network
    restart: unless-stopped