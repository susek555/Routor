include:
  - ./database/docker-compose.db.yaml

services:
  api:
    container_name: routor_api
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.12-slim-trixie
        COPY --from=ghcr.io/astral-sh/uv:0.11.17 /uv /uvx /bin/

        COPY . /app

        ENV UV_NO_DEV=1

        WORKDIR /app
        RUN uv sync --locked

        CMD ["uv", "run", "main.py"]
    ports:
      - "8000:8000"
    networks:
      - db_network
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped