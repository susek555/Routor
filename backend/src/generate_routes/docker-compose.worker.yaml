services:
  worker:
    container_name: routor_worker
    build:
      context: ../../
      dockerfile_inline: |
        FROM python:3.12-slim-trixie
        COPY --from=ghcr.io/astral-sh/uv:0.11.17 /uv /uvx /bin/
        RUN useradd -m routor_user
        COPY . /app
        RUN chown -R routor_user:routor_user /app
        ENV UV_NO_DEV=1
        WORKDIR /app
        USER routor_user
        RUN uv sync --locked
    environment:
      - CELERY_BROKER_URL=redis://routor_redis:6379/0
      - DATABASE_URL=postgresql://routor_user:routor_password@db:5432/routor_database
    command: ["uv", "run", "celery", "-A", "src.generate_routes.worker_app", "worker", "--loglevel=info"]
    networks:
      - db_network
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped